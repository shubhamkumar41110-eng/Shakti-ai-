```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handy AI</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>

<style>
body{margin:0;background:#03020a;color:white;text-align:center}
video,canvas{position:fixed;top:0;left:0;width:100%;height:100%}
video{transform:scaleX(-1)}
#splash{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center}
button{padding:12px 20px;border:none;border-radius:25px;background:#7cffc4}
#copyright{position:fixed;bottom:10px;width:100%;font-size:12px;opacity:.6}
</style>
</head>

<body>

<div id="splash">
<h1>Handy AI</h1>
<button onclick="start()">Enter Experience</button>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="copyright">
Created by Mithun AI Lab https://www.instagram.com/mithun.ai.lab/
</div>

<script>
let video=document.getElementById("video");
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

function start(){
document.getElementById("splash").style.display="none";

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject=stream;
video.onloadedmetadata=()=>initAI();
})
.catch(e=>alert("Camera error: "+e));
}

function initAI(){
const hands=new Hands({
locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${f}`
});

hands.setOptions({
maxNumHands:1,
modelComplexity:0,
minDetectionConfidence:0.6,
minTrackingConfidence:0.6
});

hands.onResults(draw);

const camera=new Camera(video,{
onFrame:async()=>{await hands.send({image:video});},
width:640,
height:480
});

camera.start();
}

function draw(res){
ctx.clearRect(0,0,canvas.width,canvas.height);

if(!res.multiHandLandmarks) return;

res.multiHandLandmarks.forEach(hand=>{
hand.forEach(p=>{
let x=p.x*canvas.width;
let y=p.y*canvas.height;
ctx.beginPath();
ctx.arc(x,y,5,0,Math.PI*2);
ctx.fillStyle="lime";
ctx.fill();
});
});
}

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.onresize=resize;
</script>

</body>
</html>
```

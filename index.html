<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handy AI</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Mono&display=swap" rel="stylesheet">

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
:root{
  --accent:#7cffc4;
  --accent2:#ff6bca;
  --accent3:#6bb5ff;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#03020a;
  font-family:'DM Mono', monospace;
  overflow:hidden;
  color:white;
}

/* VIDEO */
video{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
  transform:scaleX(-1);
  filter:brightness(0.5);
  z-index:1;
}

/* CANVASES */
canvas{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
}

/* NOISE OVERLAY */
body::after{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.025;
  background:url('data:image/svg+xml;utf8,\
<svg xmlns="http://www.w3.org/2000/svg">\
<filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3"/></filter>\
<rect width="100%" height="100%" filter="url(%23n)"/></svg>');
}

/* TOP STRIPE */
#stripe{
  position:fixed;
  top:0;
  height:2px;
  width:100%;
  background:var(--accent);
  z-index:20;
  transition:background .3s;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#03020a;
  z-index:50;
  text-align:center;
}

.logo{
  font-family:'Syne';
  font-size:4rem;
  background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));
  -webkit-background-clip:text;
  color:transparent;
}

.subtitle{
  font-size:12px;
  opacity:.6;
  letter-spacing:2px;
}

.cta{
  margin-top:30px;
  padding:12px 24px;
  background:var(--accent);
  color:black;
  border:none;
  border-radius:999px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 20px var(--accent);
}

.ring{
  position:absolute;
  border:1px solid var(--accent);
  border-radius:50%;
  animation:pulse 2s infinite;
}
.r1{width:200px;height:200px;}
.r2{width:300px;height:300px;animation-delay:.4s}
.r3{width:400px;height:400px;animation-delay:.8s}

@keyframes pulse{
  0%{transform:scale(.8);opacity:.5}
  100%{transform:scale(1.2);opacity:0}
}

/* TOP BAR */
#topbar{
  position:fixed;
  top:10px;left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:20px;
  align-items:center;
  padding:10px 20px;
  backdrop-filter:blur(12px);
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  z-index:30;
}

.mode button{
  background:none;
  border:none;
  color:white;
  cursor:pointer;
  padding:6px 10px;
  border-radius:12px;
}
.mode button.active{
  box-shadow:0 0 10px currentColor;
}

/* HUD */
#hud{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 20px;
  backdrop-filter:blur(10px);
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  z-index:30;
}

.dot{
  width:10px;height:10px;
  border-radius:50%;
  background:var(--accent);
  display:inline-block;
  margin-right:8px;
  animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:.2}}

/* TOAST */
#toast{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:3rem;
  pointer-events:none;
  opacity:0;
  transform:scale(.85);
  transition:.3s;
}
#toast.show{
  opacity:1;
  transform:scale(1);
}

/* COPYRIGHT */
#copyright{
  position:fixed;
  bottom:5px;
  left:50%;
  transform:translateX(-50%);
  font-size:10px;
  opacity:.6;
  z-index:100;
}
</style>
</head>

<body>

<div id="stripe"></div>

<!-- SPLASH -->
<div id="splash">
  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <div class="ring r3"></div>

  <div class="logo">Handy AI</div>
  <div class="subtitle">GESTURE INTELLIGENCE PLATFORM</div>

  <button class="cta" onclick="start()">Enter Experience</button>
  <p style="margin-top:10px;font-size:12px;opacity:.5">
    Camera access required · Best in Chrome / Edge
  </p>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="bg"></canvas>
<canvas id="fx"></canvas>
<canvas id="draw"></canvas>

<div id="topbar">
  <div class="brand">Handy AI <span style="font-size:10px;background:#fff2;padding:2px 6px;border-radius:6px">Beta</span></div>
  <div class="mode">
    <button id="playBtn" class="active">▶</button>
    <button id="shapeBtn">♥</button>
    <button id="writeBtn">✏</button>
  </div>
</div>

<div id="hud">
  <span class="dot"></span>
  <span id="gesture">Ready</span>
</div>

<div id="toast"></div>

<div id="copyright">
Created by Mithun AI Lab https://www.instagram.com/mithun.ai.lab/
</div>

<script>
let mode="play";
let video=document.getElementById("video");
let canvasFx=document.getElementById("fx");
let ctxFx=canvasFx.getContext("2d");

let W,H;

function resize(){
  W=canvasFx.width=window.innerWidth;
  H=canvasFx.height=window.innerHeight;
}
resize();
window.onresize=resize;

/* MODE SWITCH */
playBtn.onclick=()=>setMode("play", "--accent");
shapeBtn.onclick=()=>setMode("shapes","--accent2");
writeBtn.onclick=()=>setMode("write","--accent3");

function setMode(m,colorVar){
  mode=m;
  document.querySelectorAll(".mode button").forEach(b=>b.classList.remove("active"));
  if(m==="play") playBtn.classList.add("active");
  if(m==="shapes") shapeBtn.classList.add("active");
  if(m==="write") writeBtn.classList.add("active");

  document.getElementById("stripe").style.background=getComputedStyle(document.documentElement).getPropertyValue(colorVar);
}

/* TOAST */
function showToast(txt){
  let t=document.getElementById("toast");
  t.innerText=txt;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1600);
}

/* AUDIO */
let ctxAudio, humOsc;
function initAudio(){
  ctxAudio=new AudioContext();
}
function zap(){
  let o=ctxAudio.createOscillator();
  let g=ctxAudio.createGain();
  o.type="sawtooth";
  o.frequency.setValueAtTime(700,ctxAudio.currentTime);
  o.frequency.exponentialRampToValueAtTime(30,ctxAudio.currentTime+.12);
  o.connect(g); g.connect(ctxAudio.destination);
  o.start(); o.stop(ctxAudio.currentTime+.12);
}
function pop(){
  let o=ctxAudio.createOscillator();
  let g=ctxAudio.createGain();
  o.type="sine";
  o.frequency.setValueAtTime(300,ctxAudio.currentTime);
  o.frequency.exponentialRampToValueAtTime(150,ctxAudio.currentTime+.08);
  o.connect(g); g.connect(ctxAudio.destination);
  o.start(); o.stop(ctxAudio.currentTime+.08);
}

/* MEDIAPIPE */
let hands=new Hands({
  locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});
hands.setOptions({
  maxNumHands:2,
  modelComplexity:1,
  minDetectionConfidence:.72,
  minTrackingConfidence:.72
});

hands.onResults(onResults);

function start(){
  document.getElementById("splash").style.display="none";

  initAudio();

  navigator.mediaDevices.getUserMedia({video:{width:1920,height:1080}})
  .then(stream=>{
    video.srcObject=stream;

    const camera=new Camera(video,{
      onFrame:async()=>await hands.send({image:video}),
      width:1280,
      height:720
    });
    camera.start();
  });
}

/* DRAW LOOP */
function onResults(res){
  ctxFx.clearRect(0,0,W,H);

  if(!res.multiHandLandmarks) return;

  let handsLm=res.multiHandLandmarks;

  handsLm.forEach((lm,i)=>{
    let hue=(Date.now()/10+i*60)%360;

    // skeleton
    ctxFx.strokeStyle=`hsl(${hue},100%,60%)`;
    ctxFx.lineWidth=2;

    for(let j=0;j<lm.length;j++){
      let x=lm[j].x*W;
      let y=lm[j].y*H;
      ctxFx.beginPath();
      ctxFx.arc(x,y,5,0,Math.PI*2);
      ctxFx.fillStyle=`hsl(${hue},100%,60%)`;
      ctxFx.fill();
    }

    // pinch detect
    let dx=lm[4].x-lm[8].x;
    let dy=lm[4].y-lm[8].y;
    let d=Math.hypot(dx,dy);

    if(d<0.055 && mode==="play"){
      zap();
      showToast("⚡ Pinch");
    }

  });

  if(mode==="shapes" && handsLm.length===2){
    pop();
    showToast("♥ Heart");
    drawHeart();
  }
}

/* HEART */
function drawHeart(){
  ctxFx.beginPath();
  for(let t=0;t<Math.PI*2;t+=0.01){
    let x=16*Math.pow(Math.sin(t),3);
    let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
    ctxFx.lineTo(W/2+x*10,H/2+y*10);
  }
  ctxFx.strokeStyle="pink";
  ctxFx.stroke();
}

/* LOOP */
</script>

</body>
</html>

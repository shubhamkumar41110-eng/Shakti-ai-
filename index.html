<!-- Stable MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>

<style>
body{

<body>

<div id="splash">
  <h1>Handy AI</h1>
  <p>Gesture Intelligence Platform</p>
  <button onclick="start()">Enter Experience</button>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="copyright">
Created by Mithun AI Lab https://www.instagram.com/mithun.ai.lab/
</div>

<script>
let video=document.getElementById("video");
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

let W,H;

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
}
resize();
window.onresize=resize;

/* START */
function start(){
  document.getElementById("splash").style.display="none";

  video.setAttribute("playsinline", true);

  navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720}
  }).then(stream=>{
    video.srcObject=stream;

    video.onloadedmetadata=()=>{
      initHandTracking();
    };
  });
}

/* MEDIAPIPE */
function initHandTracking(){
  const hands=new Hands({
    locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
  });

  hands.setOptions({
    maxNumHands:2,
    modelComplexity:1,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
  });

  hands.onResults(draw);

  const camera=new Camera(video,{
    onFrame:async()=>{
      await hands.send({image:video});
    },
    width:1280,
    height:720
  });

  camera.start();
}

/* DRAW */
function draw(results){
  ctx.clearRect(0,0,W,H);

  if(!results.multiHandLandmarks) return;

  results.multiHandLandmarks.forEach((hand,i)=>{
    let hue=(Date.now()/10+i*100)%360;

    hand.forEach(p=>{
      let x=p.x*W;
      let y=p.y*H;

      ctx.beginPath();
      ctx.arc(x,y,6,0,Math.PI*2);
      ctx.fillStyle=`hsl(${hue},100%,60%)`;
      ctx.fill();
    });

    // pinch detect
    let dx=hand[4].x-hand[8].x;
    let dy=hand[4].y-hand[8].y;
    let d=Math.hypot(dx,dy);

    if(d<0.05){
      ctx.fillStyle="yellow";
      ctx.fillRect(W/2-20,H/2-20,40,40);
    }
  });
}
</script>

</body>
</html>

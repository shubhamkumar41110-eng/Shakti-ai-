<!DOCTYPE html>
<html>
<head>
  <title>Shakti AI</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }
    input {
      padding: 10px;
      width: 70%;
      margin: 10px;
    }
    button {
      padding: 10px 20px;
    }
  </style>
</head>

<body>

<h1>🤖 Shakti AI</h1>

<input id="q" placeholder="Question likho">
<br>
<button onclick="ask()">Ask</button>

<p id="ans"></p>

<script>
function ask(){
  let q = document.getElementById("q").value.toLowerCase();

  if(q.includes("hello")){
    document.getElementById("ans").innerText = "Hello bhai 👋";
  }
  else if(q.includes("time")){
    document.getElementById("ans").innerText = new Date().toLocaleTimeString();
  }
  else if(q.includes("date")){
    document.getElementById("ans").innerText = new Date().toDateString();
  }
  else if(q.includes("math")){
    document.getElementById("ans").innerText = "2 + 2 = 4";
  }
  else{
    document.getElementById("ans").innerText = "AI upgrade aa raha hai 🔥";
  }
}
</script>

</body>
</html>

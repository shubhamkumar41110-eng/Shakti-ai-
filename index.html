<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handy AI</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>

<style>
body{
margin:0;
background:#03020a;
color:white;
text-align:center;
font-family:sans-serif;
overflow:hidden;
}

video,canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

video{
transform:scaleX(-1);
}

#splash{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

button{
padding:14px 25px;
border:none;
border-radius:30px;
background:#7cffc4;
font-size:18px;
}

#copyright{
position:fixed;
bottom:10px;
width:100%;
font-size:12px;
opacity:.6;
}
</style>
</head>

<body>

<div id="splash">
<h1>Handy AI</h1>
<button onclick="start()">Enter Experience</button>
<p style="font-size:12px;opacity:.6">Allow camera when asked</p>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="copyright">
Created by Mithun AI Lab https://www.instagram.com/mithun.ai.lab/
</div>

<script>
let video=document.getElementById("video");
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

/* resize */
function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

/* start camera */
function start(){

document.getElementById("splash").style.display="none";

navigator.mediaDevices.getUserMedia({
video:{facingMode:"user"}
})
.then(stream=>{
video.srcObject = stream;

video.onloadedmetadata = () => {
initAI();
};
})
.catch(err=>{
alert("Camera error: " + err);
});
}

/* AI */
function initAI(){

const hands = new Hands({
locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
});

hands.setOptions({
maxNumHands:1,
modelComplexity:0,
minDetectionConfidence:0.6,
minTrackingConfidence:0.6
});

hands.onResults(results=>{
ctx.clearRect(0,0,canvas.width,canvas.height);

if(!results.multiHandLandmarks) return;

results.multiHandLandmarks.forEach(hand=>{
hand.forEach(p=>{
let x = p.x * canvas.width;
let y = p.y * canvas.height;

ctx.beginPath();
ctx.arc(x,y,6,0,Math.PI*2);
ctx.fillStyle="lime";
ctx.fill();
});
});
});

/* camera loop */
const camera = new Camera(video,{
onFrame: async ()=>{
await hands.send({image:video});
},
width:640,
height:480
});

camera.start();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Shakti AI 2.0</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
    }
    input {
      padding: 12px;
      width: 70%;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }
    button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: black;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🤖 Shakti AI 2.0</h1>

<input id="q" placeholder="Apna question likho...">
<br>
<button onclick="ask()">Ask AI</button>

<p id="ans"></p>

<script>
async function ask(){
  let q = document.getElementById("q").value;

  document.getElementById("ans").innerText = "Thinking... 🤔";

  let res = await fetch("https://api.affiliateplus.xyz/api/chatbot?message=" + q);

  let data = await res.json();

  document.getElementById("ans").innerText = data.message;
}
</script>

</body>
</html>
